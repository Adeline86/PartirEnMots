<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partir en mots</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --creme:      #F9F5EF;
    --lin:        #F0E8D8;
    --terre:      #C9A97A;
    --terre-dark: #8B6E45;
    --encre:      #2C2C2A;
    --encre-soft: #5A5A57;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--creme);
    color: var(--encre);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 3rem;
    transition: background 0.4s, backdrop-filter 0.4s;
  }
  nav.scrolled {
    background: rgba(249,245,239,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid rgba(201,169,122,0.3);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--encre); text-decoration: none; }
  .nav-back {
    display: flex; align-items: center; gap: 0.6rem;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--encre-soft); text-decoration: none; transition: color 0.2s;
  }
  .nav-back:hover { color: var(--terre-dark); }
  .nav-back svg { width: 12px; height: 12px; }

  /* ── COUVERTURE ── */
  .cover {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 6rem 3rem 4rem;
    position: relative; overflow: hidden;
  }
  .cover-bg {
    position: absolute; inset: 0; z-index: 0;
    background: linear-gradient(145deg, #C4B09A 0%, #8B7355 40%, #5A4A38 100%);
  }
  .cover-bg img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(44,44,42,0.78) 0%, rgba(44,44,42,0.1) 60%, transparent 100%);
  }
  .cover-content { position: relative; z-index: 2; max-width: 720px; }
  .cover-lieu {
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--terre); margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 0.8s 0.3s forwards;
  }
  .cover-titre {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 5.5vw, 5rem); font-weight: 300; line-height: 1.05;
    color: #F9F5EF; margin-bottom: 1.25rem;
    opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
  }
  .cover-intro {
    font-size: 1rem; color: rgba(249,245,239,0.75); max-width: 560px;
    line-height: 1.75; margin-bottom: 2.5rem;
    opacity: 0; animation: fadeUp 0.8s 0.7s forwards;
  }
  .cover-meta {
    display: flex; gap: 2rem;
    opacity: 0; animation: fadeUp 0.8s 0.9s forwards;
  }
  .meta-item { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(249,245,239,0.5); }
  .meta-item span { color: var(--terre); display: block; font-size: 0.85rem; letter-spacing: 0.05em; text-transform: none; margin-top: 2px; }
  .scroll-hint {
    position: absolute; bottom: 2rem; right: 3rem; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0; animation: fadeIn 1s 1.2s forwards;
  }
  .scroll-hint-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(249,245,239,0.4); writing-mode: vertical-rl; }
  .scroll-hint-line { width: 0.5px; height: 48px; background: rgba(249,245,239,0.25); animation: lineDown 1.5s 1.5s ease-in-out infinite; }
  @keyframes lineDown {
    0%   { transform: scaleY(0); opacity: 0; transform-origin: top; }
    50%  { transform: scaleY(1); opacity: 1; }
    100% { transform: scaleY(0); opacity: 0; transform-origin: bottom; }
  }

  /* ── CARTE + SOMMAIRE ── */
  .intro-section {
    max-width: 1000px;
    margin: 0 auto;
    padding: 5rem 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: start;
  }

  /* Carte Leaflet */
  #map {
    height: 380px;
    border-radius: 2px;
    border: 0.5px solid rgba(201,169,122,0.35);
    z-index: 1;
  }
  /* Style custom des marqueurs */
  .map-marker {
    width: 10px; height: 10px;
    background: var(--terre);
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }

  /* Sommaire */
  .sommaire { }
  .sommaire-label {
    font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--terre); margin-bottom: 1.5rem;
  }
  .sommaire-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 300; line-height: 1.2;
    margin-bottom: 2rem;
  }
  .sommaire-list { list-style: none; }
  .sommaire-list li {
    border-top: 0.5px solid rgba(201,169,122,0.25);
  }
  .sommaire-list li:last-child { border-bottom: 0.5px solid rgba(201,169,122,0.25); }
  .sommaire-list a {
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-rows: auto auto;
    align-items: baseline;
    gap: 0 0.75rem;
    padding: 0.9rem 0;
    text-decoration: none; color: var(--encre);
    transition: color 0.2s, padding-left 0.2s;
  }
  .sommaire-list a:hover { color: var(--terre-dark); padding-left: 0.5rem; }
  .sommaire-jour {
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--terre); white-space: nowrap;
    grid-column: 1; grid-row: 1;
  }
  .sommaire-titre {
    font-size: 0.92rem;
    grid-column: 2; grid-row: 1;
  }
  .sommaire-lieux {
    font-size: 0.75rem; color: var(--encre-soft);
    grid-column: 1 / 3; grid-row: 2;
    padding-left: calc(3.5rem); /* aligne sous le titre */
    line-height: 1.5;
    white-space: normal;
    word-break: break-word;
  }
  .sommaire-arrow {
    font-size: 0.7rem; color: var(--terre);
    grid-column: 3; grid-row: 1;
  }

  /* ── SÉPARATEUR ── */
  .section-sep {
    max-width: 1000px; margin: 0 auto;
    border: none; border-top: 0.5px solid rgba(201,169,122,0.3);
  }

  /* ── JOURS ── */
  .story-body { max-width: 860px; margin: 0 auto; padding: 0 2rem; }

  .day-block { padding: 5rem 0; }
  .day-block + .day-block { border-top: 0.5px solid rgba(201,169,122,0.2); }

  .day-header { margin-bottom: 3.5rem; }
  .day-number {
    font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--terre); margin-bottom: 0.4rem;
  }
  .day-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 300; line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .day-lieux { font-size: 0.8rem; color: var(--encre-soft); letter-spacing: 0.04em; }

  /* Entrées photo */
  .story-entry { padding: 2.5rem 0; }
  .entry-layout { display: grid; gap: 3rem; align-items: center; }
  .entry-layout.left  { grid-template-columns: 3fr 2fr; }
  .entry-layout.right { grid-template-columns: 2fr 3fr; }
  .entry-layout.full  { grid-template-columns: 1fr; }
  .entry-layout.right .entry-photo { order: 2; }
  .entry-layout.right .entry-text  { order: 1; }

  .photo-wrap { overflow: hidden; border-radius: 2px; position: relative; }
  .photo-wrap img {
    display: block; width: 100%; aspect-ratio: 4/3; object-fit: cover;
    transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .entry-layout.full .photo-wrap img { aspect-ratio: 16/9; }
  .story-entry:hover .photo-wrap img { transform: scale(1.025); }

  .photo-placeholder {
    width: 100%; aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .entry-layout.full .photo-placeholder { aspect-ratio: 16/9; }
  .story-entry:hover .photo-placeholder { transform: scale(1.025); }
  .ph-0 { background: linear-gradient(145deg,#D4BFA8 0%,#8B6E45 100%); }
  .ph-1 { background: linear-gradient(135deg,#A8BEC4 0%,#4A6E7C 100%); }
  .ph-2 { background: linear-gradient(145deg,#C4D4A8 0%,#6E8B45 100%); }
  .ph-3 { background: linear-gradient(155deg,#C4A8B4 0%,#7C4A6E 100%); }
  .ph-4 { background: linear-gradient(135deg,#D4CCA8 0%,#8B7E45 100%); }
  .ph-5 { background: linear-gradient(145deg,#A8C4B8 0%,#4A7C6E 100%); }
  .ph-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem; color: rgba(255,255,255,0.35); text-align: center; }

  .photo-number {
    position: absolute; bottom: -1.25rem; right: 0;
    font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 300;
    color: rgba(201,169,122,0.15); line-height: 1; pointer-events: none; user-select: none;
  }

  .entry-tag { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--terre); margin-bottom: 0.75rem; }
  .entry-caption { font-family: 'Cormorant Garamond', serif; font-size: 1.45rem; font-weight: 300; line-height: 1.4; margin-bottom: 1rem; }
  .entry-body { font-size: 0.92rem; color: var(--encre-soft); line-height: 1.85; }
  .entry-layout.full .entry-text { max-width: 620px; margin: 2rem auto 0; text-align: center; }

  /* Citation */
  .story-quote { padding: 3rem 3rem; text-align: center; }
  .story-quote::before, .story-quote::after { content: ''; display: block; width: 40px; height: 0.5px; background: var(--terre); margin: 0 auto; }
  .story-quote::before { margin-bottom: 1.75rem; }
  .story-quote::after  { margin-top: 1.75rem; }
  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.35rem, 2.5vw, 2rem); font-weight: 300; font-style: italic;
    line-height: 1.35; max-width: 660px; margin: 0 auto;
  }

  /* ── FIN ── */
  .story-end {
    padding: 5rem 2rem; text-align: center;
    border-top: 0.5px solid rgba(201,169,122,0.3);
    max-width: 860px; margin: 0 auto;
  }
  .end-label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--terre); margin-bottom: 1rem; }
  .end-titre { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; font-style: italic; margin-bottom: 2.5rem; }
  .end-nav { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
  .end-btn {
    display: inline-flex; align-items: center; gap: 0.6rem;
    font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--encre); text-decoration: none;
    border: 0.5px solid var(--terre); padding: 0.75rem 1.5rem; border-radius: 1px;
    transition: background 0.2s, color 0.2s;
  }
  .end-btn:hover { background: var(--encre); color: #F9F5EF; border-color: var(--encre); }
  .end-btn svg { width: 12px; height: 12px; }
  .end-btn.disabled { opacity: 0.3; pointer-events: none; }

  /* ── PAGE ERREUR ── */
  .error-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .error-page h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; margin-bottom: 1rem; }
  .error-page p { color: var(--encre-soft); margin-bottom: 2rem; }
  .error-page a { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--terre-dark); text-decoration: none; border-bottom: 0.5px solid currentColor; }

  /* ── FOOTER ── */
  footer { padding: 2rem 3rem; border-top: 0.5px solid rgba(201,169,122,0.25); display: flex; align-items: center; justify-content: space-between; }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; color: var(--encre-soft); text-decoration: none; }
  .footer-copy { font-size: 0.75rem; color: rgba(90,90,87,0.45); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.9s ease, transform 0.9s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 800px) {
    nav { padding: 1rem 1.5rem; }
    .cover { padding: 5rem 1.5rem 3rem; }
    .intro-section { grid-template-columns: 1fr; gap: 2.5rem; }
    #map { height: 260px; }
    .story-body { padding: 0 1.25rem; }
    .entry-layout.left, .entry-layout.right { grid-template-columns: 1fr; }
    .entry-layout.right .entry-photo { order: 1; }
    .entry-layout.right .entry-text  { order: 2; }
    footer { flex-direction: column; gap: 0.75rem; text-align: center; }
  }
</style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6H2M5 2L1 6l4 4"/></svg>
    Tous les récits
  </a>
  <a href="index.html" class="nav-logo">partir en mots</a>
</nav>

<div id="app"></div>

<footer>
  <a href="index.html" class="footer-logo">partir en mots</a>
  <p class="footer-copy">© 2025 — Fait avec soin</p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="voyages.js"></script>
<script>
const params  = new URLSearchParams(window.location.search);
const id      = params.get("id");
const voyage  = VOYAGES.find(v => v.id === id);
const index   = VOYAGES.findIndex(v => v.id === id);
const app     = document.getElementById("app");

// ── Voyage introuvable
if (!voyage) {
  app.innerHTML = `
    <div class="error-page">
      <h1>Voyage introuvable</h1>
      <p>Ce récit n'existe pas encore — ou il arrive bientôt.</p>
      <a href="index.html">Retour à l'accueil</a>
    </div>`;
  document.title = "Partir en mots";

} else {
  document.title = `${voyage.titre} — Partir en mots`;

  // ── Couverture
  const coverBg = voyage.cover
    ? `<div class="cover-bg"><img src="${voyage.cover}" alt="${voyage.titre}"></div>`
    : `<div class="cover-bg"></div>`;

  // ── Sommaire
  const sommaireItems = voyage.jours.map((j, i) => `
    <li>
      <a href="#jour-${i+1}">
        <span class="sommaire-jour">Jour ${i+1}</span>
        <span class="sommaire-titre">${j.titre}</span>
        <span class="sommaire-lieux">${j.lieux_du_jour}</span>
        <span class="sommaire-arrow">→</span>
      </a>
    </li>`).join("");

  // ── Jours + entrées
  let photoCount = 0;
  const joursHTML = voyage.jours.map((j, ji) => {
    const entreesHTML = j.entrees.map((e) => {
      const quoteHTML = e.quote
        ? `<div class="story-quote reveal"><p class="quote-text">${e.quote}</p></div>` : "";
      const photoInner = e.photo
        ? `<img src="${e.photo}" alt="${e.titre}">`
        : `<div class="photo-placeholder ph-${photoCount % 6}"><p class="ph-label">Photo ${String(photoCount+1).padStart(2,"0")}</p></div>`;
      const numeroHTML = e.layout !== "full"
        ? `<span class="photo-number">${String(photoCount+1).padStart(2,"0")}</span>` : "";
      photoCount++;
      return `
        ${quoteHTML}
        <div class="story-entry reveal">
          <div class="entry-layout ${e.layout}">
            <div class="entry-photo">
              <div class="photo-wrap">${photoInner}</div>
              ${numeroHTML}
            </div>
            <div class="entry-text">
              <p class="entry-tag">${e.tag}</p>
              <p class="entry-caption">${e.titre}</p>
              <p class="entry-body">${e.texte}</p>
            </div>
          </div>
        </div>`;
    }).join("");

    return `
      <div class="day-block reveal" id="jour-${ji+1}">
        <div class="day-header">
          <p class="day-number">Jour ${ji+1}</p>
          <h2 class="day-title">${j.titre}</h2>
          <p class="day-lieux">${j.lieux_du_jour}</p>
        </div>
        ${entreesHTML}
      </div>`;
  }).join("");

  // ── Navigation prev/next
  const prev = VOYAGES[index - 1];
  const next = VOYAGES[index + 1];
  const prevBtn = prev
    ? `<a href="voyage.html?id=${prev.id}" class="end-btn"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6H2M5 2L1 6l4 4"/></svg>${prev.titre}</a>`
    : `<span class="end-btn disabled"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6H2M5 2L1 6l4 4"/></svg>Récit précédent</span>`;
  const nextBtn = next
    ? `<a href="voyage.html?id=${next.id}" class="end-btn">${next.titre}<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h8M7 2l4 4-4 4"/></svg></a>`
    : `<span class="end-btn disabled">Récit suivant<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h8M7 2l4 4-4 4"/></svg></span>`;

  // ── Rendu
  app.innerHTML = `
    <header class="cover">
      ${coverBg}
      <div class="cover-content">
        <p class="cover-lieu">${voyage.lieu} &nbsp;·&nbsp; ${voyage.date}</p>
        <h1 class="cover-titre">${voyage.titre}</h1>
        <p class="cover-intro">${voyage.intro}</p>
        <div class="cover-meta">
          <div class="meta-item">Durée <span>${voyage.duree}</span></div>
          <div class="meta-item">Jours <span>${voyage.jours.length}</span></div>
          <div class="meta-item">Saison <span>${voyage.saison}</span></div>
        </div>
      </div>
      <div class="scroll-hint">
        <div class="scroll-hint-line"></div>
        <span class="scroll-hint-label">Défiler</span>
      </div>
    </header>

    <div class="intro-section reveal">
      <div>
        <p class="sommaire-label">Carte du voyage</p>
        <div id="map"></div>
      </div>
      <div class="sommaire">
        <p class="sommaire-label">Au programme</p>
        <h2 class="sommaire-title">${voyage.jours.length} jours,<br>${voyage.lieu}</h2>
        <ul class="sommaire-list">${sommaireItems}</ul>
      </div>
    </div>

    <hr class="section-sep">

    <div class="story-body">${joursHTML}</div>

    <div class="story-end reveal">
      <p class="end-label">Fin du récit</p>
      <p class="end-titre">${voyage.titre}</p>
      <div class="end-nav">
        ${prevBtn}
        <a href="index.html" class="end-btn">Retour à l'accueil</a>
        ${nextBtn}
      </div>
    </div>`;

  // ── Carte Leaflet
  setTimeout(() => {
    const lieux = voyage.lieux;
    if (lieux && lieux.length > 0) {
      const map = L.map('map', { zoomControl: true, scrollWheelZoom: false });

      // Tuiles OpenStreetMap style neutre
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CartoDB',
        subdomains: 'abcd', maxZoom: 16
      }).addTo(map);

      // Marqueurs personnalisés
      const icon = L.divIcon({
        className: '',
        html: '<div class="map-marker"></div>',
        iconSize: [10, 10],
        iconAnchor: [5, 5],
      });

      const bounds = [];
      lieux.forEach(l => {
        bounds.push([l.lat, l.lng]);
        L.marker([l.lat, l.lng], { icon })
          .addTo(map)
          .bindPopup(`<strong style="font-family:'DM Sans',sans-serif;font-size:13px">${l.nom}</strong>`, {
            closeButton: false, className: 'custom-popup'
          });
      });

      // Centrage automatique sur tous les lieux
      if (bounds.length === 1) {
        map.setView(bounds[0], 12);
      } else {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    }
  }, 100);
}

// ── Nav scroll
const nav = document.getElementById("nav");
window.addEventListener("scroll", () => {
  nav.classList.toggle("scrolled", window.scrollY > 60);
});

// ── Reveal au scroll
setTimeout(() => {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add("visible"); observer.unobserve(e.target); }
    });
  }, { threshold: 0.06 });
  document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
}, 100);
